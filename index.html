<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoDash | Search</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-glow"></div>

    <main class="main-container">
        <header>
            <h1>Crypto<span class="green-text">Search</span></h1>
            <p>Explorez la blockchain en temps réel.</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <div class="input-wrapper">
                    <span class="search-icon">⚡</span>
                    <input type="text" id="cryptoInput" placeholder="Rechercher un token (ex: BTC, SOL, ETH)..." autocomplete="off">
                    <button type="button" class="search-btn">Analyser</button>
                </div>
            </div>

            <div class="favorites">
                <div class="fav-item" title="Bitcoin">
                    <div class="fav-icon"aria-hidden="true">₿</div>
                    <span>BTC</span>
                </div>
                <div class="fav-item" title="Ethereum">
                    <div class="fav-icon" aria-hidden="true">Ξ</div>
                    <span>ETH</span>
                </div>
                <div class="fav-item" title="Solana">
                    <div class="fav-icon" aria-hidden="true">S</div>
                    <span>SOL</span>
                </div>
                <div class="fav-item add-new">
                    <div class="fav-icon" aria-hidden="true">+</div>
                    <span>Suivre</span>
                </div>
            </div>
        </section>
    </main>
    <footer class="status-bar">
        <span class="dot"></span> Réseau opérationnel • <span class="green-text">24,432 nodes</span>
    </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
