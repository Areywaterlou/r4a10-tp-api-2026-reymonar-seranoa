<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Token | CryptoTracker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="results-page">

    <nav class="navbar">
        <a href="index.html" class="back-btn">← Retour à la recherche</a>
        <div class="nav-logo">Crypto<span class="green-text">Tracker</span></div>
        <div class="nav-search">
            <input type="text" placeholder="Nouvelle recherche...">
        </div>
    </nav>

    <main class="result-container">
        <section class="coin-header">
            <div class="coin-main-info">
                <img src="" alt="" class="main-logo">
                <div>
                    <h1>Chargement... <span class="symbol">--</span></h1>
                    <span class="badge">Rang #--</span>
                </div>
            </div>
            <div>
                <button id="favoriteButton"class="icon-btn favorite-btn" title="Ajouter aux favoris">⭐</button>
            </div>
            <div class="coin-price-block">
                <h2 class="price-val">--.--</h2>
                <span class="change">--% (24h)</span>
            </div>
        </section>

        <section class="data-grid">
            <div class="data-card">
                <label>Capitalisation Boursière</label>
                <p>--</p>
            </div>
            <div class="data-card">
                <label>Volume 24h</label>
                <p>--</p>
            </div>
            <div class="data-card">
                <label>Offre en circulation</label>
                <p>--</p>
            </div>
            <div class="data-card highlight">
                <label>Plus haut historique (ATH)</label>
                <p class="green-text">--</p>
            </div>
        </section>

        <section class="chart-section">
            <div class="chart-info">
                <h3>Cryptos similaires</h3>
                <p>Découvrez d'autres jetons proches de <span id="currentCoinName" class="green-text">...</span></p>
            </div>
            
            <div id="similarCoinsList" class="favorites-box">
                <span class="empty-msg">Chargement des suggestions...</span>
            </div>
        </section>
    </main>

    <footer class="status-bar">
        <span>Source : CoinGecko API v3</span>
        <span>Mise à jour en temps réel</span>
    </footer>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
